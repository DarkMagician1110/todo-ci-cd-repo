name: CI/CD Todo Fullstack

on:
  push:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Backend test
      run: |
        cd backend
        npm install
        npm test

  deploy:
    needs: test
    runs-on: ubuntu-latest

    steps:
    - name: Trigger Render Deploy
      run: curl ${{ secrets.RENDER_DEPLOY_HOOK }}