name: CI/CD Todo Fullstack Pipeline

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

env:
  CI: true
  NODE_ENV: test

jobs:
  lint:
    name: Code Style Check
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: 'backend/package-lock.json'
    - name: Install dependencies
      run: |
        cd backend
        npm ci
    - name: Check code style
      run: |
        cd backend
        npm run lint --if-present

  test-backend:
    name: Backend Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        node-version: [16.x, 18.x, 20.x]
    steps:
    - uses: actions/checkout@v3
    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v3
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        cache-dependency-path: 'backend/package-lock.json'
    - name: Install dependencies
      run: |
        cd backend
        npm ci
    - name: Run unit tests
      run: |
        cd backend
        npm test -- --testMatch="**/*.unit.test.js" --coverage --maxWorkers=2

  build-frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    needs: lint
    steps:
    - uses: actions/checkout@v3
    - name: Check for security issues
      run: |
        cd frontend
        if grep -q "eval(" script.js; then
          echo "❌ ERROR: Security risk detected! eval() found."
          exit 1
        fi
        if grep -q "innerHTML" script.js; then
          echo "⚠️ WARNING: innerHTML usage detected."
        fi

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
    - name: Install dependencies
      run: |
        cd backend
        npm ci
    - name: Run npm audit
      run: |
        cd backend
        npm audit --audit-level=moderate

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [test-backend, build-frontend]
    steps:
    - uses: actions/checkout@v3
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
    - name: Install backend dependencies
      run: |
        cd backend
        npm ci
    - name: Run integration tests
      run: |
        cd backend
        npm test -- --testMatch="**/*.integration.test.js"

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [test-backend, integration-tests, security]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
    - uses: actions/checkout@v3
    - name: Deploy hook
      run: |
        if [ -n "${{ secrets.RENDER_DEPLOY_HOOK }}" ]; then
          curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK }}
        fi

  notify:
    name: Notify Status
    runs-on: ubuntu-latest
    needs: [lint, test-backend, build-frontend, security, integration-tests, deploy]
    if: always()
    steps:
    - name: Generate summary
      run: |
        echo "## CI/CD Pipeline Summary" >> $GITHUB_STEP_SUMMARY
        echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
        echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
        echo "| Lint | ${{ needs.lint.result }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Backend Tests | ${{ needs.test-backend.result }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Frontend Build | ${{ needs.build-frontend.result }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Security Scan | ${{ needs.security.result }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Integration | ${{ needs.integration-tests.result }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Deploy | ${{ needs.deploy.result }} |" >> $GITHUB_STEP_SUMMARY