name: CI/CD Todo Fullstack Pipeline

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

env:
  CI: true
  NODE_ENV: test

jobs:
  # ==================== LINT & FORMAT ====================
  lint:
    name: Code Style Check
    runs-on: ubuntu-latest
    continue-on-error: false

    steps:
    - uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: 'backend/package-lock.json'

    - name: Install dependencies
      run: |
        cd backend
        npm ci
        
    - name: Check code style
      run: |
        cd backend
        npm run lint --if-present

  # ==================== BACKEND TESTING ====================
  test-backend:
    name: Backend Unit Tests
    runs-on: ubuntu-latest
    needs: lint

    strategy:
      matrix:
        node-version: [16.x, 18.x, 20.x]

    steps:
    - uses: actions/checkout@v3

    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v3
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        cache-dependency-path: 'backend/package-lock.json'

    - name: Install dependencies
      run: |
        cd backend
        npm ci

    - name: Run unit tests only
      run: |
        cd backend
        npm test -- --testMatch="**/*.unit.test.js" --coverage --maxWorkers=2
      timeout-minutes: 10

    - name: Upload coverage reports
      uses: codecov/codecov-action@v3
      with:
        files: ./backend/coverage/lcov.info
        flags: backend
        name: backend-coverage
      continue-on-error: false

    - name: Check test results
      if: always()
      run: |
        echo "Backend tests completed"
        if [ -f ./backend/coverage/coverage-summary.json ]; then
          node -e "const c = require('./backend/coverage/coverage-summary.json'); console.log('Coverage:', c.total);"
        fi

  # ==================== BUILD FRONTEND ====================
  build-frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    needs: lint

    steps:
    - uses: actions/checkout@v3

    - name: Check frontend files
      run: |
        cd frontend
        echo "Frontend files verified:"
        ls -la

    - name: Check for security issues
      run: |
        cd frontend
        grep -r "eval(" script.js && echo "Warning: eval() found" || echo "No eval() found"
        grep -r "innerHTML" script.js && echo "Warning: innerHTML usage" || echo "No innerHTML unsafe usage"

  # ==================== SECURITY SCAN ====================
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    continue-on-error: false

    steps:
    - uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'

    - name: Install dependencies
      run: |
        cd backend
        npm ci

    - name: Run npm audit
      run: |
        cd backend
        npm audit --audit-level=moderate

    - name: Dependency check
      run: |
        cd backend
        npm list

  # ==================== INTEGRATION TESTS ====================
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [test-backend, build-frontend]
    continue-on-error: false

    steps:
    - uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: 'backend/package-lock.json'

    - name: Install backend dependencies
      run: |
        cd backend
        npm ci

    - name: Run integration tests
      run: |
        cd backend
        npm test -- --testMatch="**/*.integration.test.js"

    - name: Integration tests completed
      run: echo "Integration tests finished"

  # ==================== DEPLOYMENT ====================
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [test-backend, integration-tests, security]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
    - uses: actions/checkout@v3

    - name: Display commit info
      run: |
        echo "Commit: ${{ github.sha }}"
        echo "Branch: ${{ github.ref }}"
        echo "Author: ${{ github.actor }}"

    - name: Deploy hook
      run: |
        if [ -z "${{ secrets.RENDER_DEPLOY_HOOK }}" ]; then
          echo "RENDER_DEPLOY_HOOK not configured - skipping deployment"
        else
          echo "Triggering deployment..."
          curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK }}
          echo "Deployment triggered"
        fi
      timeout-minutes: 5

    - name: Deployment completed
      run: echo "Pipeline completed successfully!"

  # ==================== NOTIFICATIONS ====================
  notify:
    name: Notify Status
    runs-on: ubuntu-latest
    needs: [lint, test-backend, build-frontend, security, integration-tests, deploy]
    if: always()

    steps:
    - name: Generate summary
      run: |
        echo "## CI/CD Pipeline Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
        echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
        echo "| Lint | ${{ needs.lint.result }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Backend Tests | ${{ needs.test-backend.result }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Frontend Build | ${{ needs.build-frontend.result }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Security Scan | ${{ needs.security.result }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Integration | ${{ needs.integration-tests.result }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Deploy | ${{ needs.deploy.result }} |" >> $GITHUB_STEP_SUMMARY

    - name: Success notification
      if: success()
      run: echo " All checks passed!"

    - name: Failure notification
      if: failure()
      run: echo "Pipeline failed - check logs above"